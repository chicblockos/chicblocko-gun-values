<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="The new Chicblocko Gun Values experience is coming soon.">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#050505">
  <title>Coming Soon | Chicblocko Gun Values</title>
  <link rel="icon" type="image/webp" href="assets/chicblocko-logo.webp">
  <style>
    :root{color-scheme:dark;--line:#303030;--muted:#a7a7a7;--display:"Arial Black",Impact,Haettenschweiler,sans-serif}
    *{box-sizing:border-box}
    html,body{min-height:100%;margin:0}
    body{display:grid;place-items:center;overflow:hidden;color:#fff;background:#030303;font-family:Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background:radial-gradient(circle at 50% 36%,#242424 0,rgba(20,20,20,.74) 18%,transparent 48%),linear-gradient(rgba(255,255,255,.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.022) 1px,transparent 1px);background-size:auto,48px 48px,48px 48px;mask-image:linear-gradient(to bottom,#000,transparent 86%)}
    .wrap{width:min(920px,calc(100% - 34px));position:relative;padding:54px 28px;text-align:center}
    .logo-shell{width:clamp(112px,15vw,156px);aspect-ratio:1;margin:0 auto 30px;padding:7px;position:relative;background:#0d0d0d;border:2px solid #fff;border-radius:28px;box-shadow:0 9px 0 #373737,0 30px 75px #000}
    .logo-shell:after{content:"";position:absolute;inset:-13px;border:1px solid #303030;border-radius:36px;animation:pulse 2.6s ease-in-out infinite}
    .logo-shell img{width:100%;height:100%;display:block;object-fit:cover;border-radius:20px}
    .label{display:inline-flex;align-items:center;gap:9px;margin-bottom:17px;color:#c4c4c4;font-size:10px;font-weight:900;letter-spacing:.2em}
    .label i{width:7px;height:7px;background:#fff;border-radius:50%;box-shadow:0 0 12px #fff;animation:blink 1.5s ease-in-out infinite}
    h1{margin:0;font:900 clamp(52px,10vw,108px)/.82 var(--display);letter-spacing:-.075em;text-transform:uppercase;text-shadow:0 4px 0 #383838,0 10px 35px #000;transform:skew(-3deg)}
    h1 span{display:block;width:fit-content;margin:14px auto 0;padding:9px 22px 12px;color:#050505;background:#fff;border:3px solid #050505;border-radius:15px;box-shadow:7px 8px 0 #414141;font-size:.64em;letter-spacing:-.055em;transform:rotate(-1deg)}
    .copy{max-width:590px;margin:31px auto 0;color:var(--muted);font-size:clamp(14px,2vw,17px);line-height:1.65}
    .copy strong{color:#fff}
    .status{max-width:560px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;margin:35px auto 0;padding:15px 17px;background:linear-gradient(145deg,#161616,#090909);border:1px solid var(--line);border-radius:13px;box-shadow:inset 0 1px rgba(255,255,255,.07)}
    .bar{height:7px;overflow:hidden;background:#252525;border-radius:99px}
    .bar:after{content:"";width:62%;height:100%;display:block;background:#fff;border-radius:inherit;box-shadow:0 0 16px rgba(255,255,255,.4);animation:load 2.8s ease-in-out infinite alternate}
    .status b{font:900 10px var(--display);letter-spacing:.08em;white-space:nowrap}
    footer{margin-top:32px;color:#676767;font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
    @keyframes pulse{50%{opacity:.3;transform:scale(1.04)}}
    @keyframes blink{50%{opacity:.25;transform:scale(.75)}}
    @keyframes load{from{width:55%}to{width:68%}}
    @media(max-width:520px){.wrap{padding:34px 8px}.logo-shell{margin-bottom:27px;border-radius:23px}.logo-shell img{border-radius:16px}h1{font-size:clamp(48px,18vw,72px)}h1 span{padding:8px 14px 10px}.copy{margin-top:28px}.status{grid-template-columns:1fr;gap:11px}.status b{grid-row:1;text-align:left}}
    @media(prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="logo-shell"><img src="assets/chicblocko-logo.webp" width="255" height="255" alt="Chicblocko logo"></div>
    <div class="label"><i aria-hidden="true"></i> NEW EXPERIENCE IN DEVELOPMENT</div>
    <h1>CHICBLOCKO<span>COMING SOON</span></h1>
    <p class="copy">We are rebuilding <strong>Chicblocko Gun Values</strong> into a faster, cleaner, and more complete destination for the community. The value index will return soon.</p>
    <div class="status" aria-label="Website development in progress"><div class="bar" aria-hidden="true"></div><b>BUILD IN PROGRESS</b></div>
    <footer>Chicblocko Gun Values &nbsp;•&nbsp; The Custom Value Index</footer>
  </main>
</body>
</html>
